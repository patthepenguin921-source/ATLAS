# Local development. The database is Supabase (hosted); this brings up the
# backend (and optionally the frontend) against it.
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app

  # Optional: run the frontend in a container too.
  # frontend:
  #   image: node:22-alpine
  #   working_dir: /app
  #   ports: ["3000:3000"]
  #   env_file: [.env]
  #   volumes: ["./frontend:/app"]
  #   command: sh -c "npm install && npm run dev"
